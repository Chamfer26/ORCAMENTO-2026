<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nova Chamfer — Cenários Orçamento 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --nv:#0D2137;--bd:#1B3F6B;--bm:#2E6DA4;--bl:#C8DCF0;--bp:#EBF3FA;
  --eb:#D6E4F3;--ebf:#1B3F6B;--gb:#E8F5E9;--gf:#2E7D32;
  --rb:#FFEBEE;--rf:#C62828;--ib:#E8F0FE;--if:#1A237E;
  --bg:#F5F7FA;--cd:#fff;--br:#DDE3ED;--tx:#1A2E44;--mt:#607080;
  --r25c:rgba(124,77,255,.05);--r26c:rgba(0,137,123,.05);--prc:rgba(245,124,0,.05);
  --scn1:#E3F2FD;--scn1b:#1565C0;--scn2:#E8F5E9;--scn2b:#2E7D32;--scn3:#FFF8E1;--scn3b:#E65100;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:12px;overflow:hidden;height:100vh;display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{background:#fff;color:var(--tx);flex-shrink:0;border-bottom:1px solid var(--br);box-shadow:0 1px 3px rgba(0,0,0,.06);}
.topbar-row1{display:flex;align-items:center;gap:8px;padding:0 12px;height:40px;}
.topbar-row2{display:flex;align-items:center;gap:3px;padding:2px 12px 4px;border-top:1px solid var(--br);overflow-x:auto;scrollbar-width:none;}
.topbar-row2::-webkit-scrollbar{display:none;}
.t-logo{font-size:12px;font-weight:700;letter-spacing:.04em;white-space:nowrap;color:var(--nv);}
.t-sep{opacity:.2;font-size:16px;color:var(--mt);}
.cc-scroll{display:flex;gap:3px;}
.cct{padding:3px 9px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--br);color:var(--mt);background:transparent;white-space:nowrap;transition:all .12s;}
.cct.on{background:#2E6DA4;border-color:#2E6DA4;color:#fff;}
.cct:hover:not(.on){border-color:var(--bm);color:var(--nv);}
.cct.has-edit{border-color:#E65100;color:#E65100;}
.cct.has-edit.on{background:#BF360C;border-color:#E65100;color:#fff;}
.t-btn{padding:4px 8px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1px solid;line-height:1.4;}
.t-reset{background:transparent;border-color:var(--br);color:var(--mt);}
.t-reset:hover{background:var(--bg);color:var(--tx);}
.t-export{background:#2E6DA4;border-color:#2E6DA4;color:#fff;}
.t-export:hover{background:#1B5A8C;}
.t-excel{background:#1B5E20;border-color:#1B5E20;color:#fff;}
.t-excel:hover{background:#145214;}
.t-import{background:#4A148C;border-color:#4A148C;color:#fff;cursor:pointer;display:inline-flex;align-items:center;padding:4px 8px;border-radius:5px;font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0;border:1px solid #4A148C;line-height:1.4;}
.t-import:hover{background:#38006b;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:268px 1fr;flex:1;overflow:hidden;}

/* LEFT PANEL */
.lp{background:#fff;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--br);}
.lp-kpis{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:9px;flex-shrink:0;border-bottom:1px solid var(--br);}
.lpk{background:var(--bp);border-radius:6px;padding:6px 8px;border:1px solid var(--bl);}
.lpk-l{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.05em;}
.lpk-v{font-size:14px;font-weight:700;margin-top:1px;color:var(--nv);}
.lpk-d{font-size:9px;color:var(--mt);margin-top:1px;}
.lpk-d .up{color:#2E7D32;font-weight:600;}.lpk-d .dn{color:#C62828;font-weight:600;}
.lp-mini{padding:7px 9px;flex-shrink:0;border-bottom:1px solid var(--br);background:var(--bg);}
.lp-mini-t{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.lp-edit{flex:1;overflow-y:auto;padding:6px 8px;background:var(--bg);}
.le-hdr{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.07em;padding:6px 2px 3px;display:flex;align-items:center;justify-content:space-between;}
.le-hdr span{color:var(--bm);font-size:10px;text-transform:none;letter-spacing:0;}
.grp-lbl{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;padding:8px 2px 3px;border-bottom:1px solid var(--br);font-weight:600;}
.ar{display:flex;align-items:center;gap:5px;padding:3px 4px;border-radius:4px;cursor:pointer;}
.ar:hover{background:var(--bp);}
.ar.edi{background:#FFF8E1;}
.ar-name{flex:1;font-size:10px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.ar-val{font-size:10px;font-weight:600;min-width:68px;text-align:right;flex-shrink:0;}
.ar-val.n{color:#C62828;}.ar-val.p{color:#2E7D32;}.ar-val.z{color:var(--mt);}
.ied{display:none;background:#fff;border:1px solid var(--br);border-radius:6px;padding:8px;margin:2px 0 6px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.ied.open{display:block;}
.ied-t{font-size:9px;color:var(--mt);margin-bottom:6px;line-height:1.4;}
.ied-g{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:6px;}
.ied-m label{font-size:8px;color:var(--mt);display:block;text-align:center;margin-bottom:2px;}
.ied-m input{width:100%;background:#fff;border:1px solid var(--br);border-radius:3px;color:var(--tx);padding:3px 4px;font-size:10px;text-align:right;}
.ied-m input:focus{outline:none;border-color:var(--bm);background:var(--bp);}
.ied-actions{display:flex;gap:5px;}
.ied-btn{flex:1;padding:4px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:600;border:none;}
.ied-apply{background:#2E6DA4;color:#fff;}.ied-apply:hover{background:#1B5A8C;}
.ied-reset{background:var(--bg);color:var(--mt);border:1px solid var(--br);}.ied-reset:hover{background:var(--bp);color:var(--nv);}
.ebadge{font-size:8px;background:#E65100;color:#fff;padding:1px 4px;border-radius:3px;margin-left:3px;vertical-align:middle;font-weight:700;}

/* RIGHT PANEL */
.rp{display:flex;flex-direction:column;overflow:hidden;}
.vtabs{display:flex;gap:0;border-bottom:2px solid var(--br);background:#fff;padding:0 14px;flex-shrink:0;}
.vt{padding:8px 16px;font-size:11px;font-weight:600;cursor:pointer;color:var(--mt);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s;white-space:nowrap;}
.vt.on{color:var(--nv);border-bottom-color:var(--bm);}
.vt:hover:not(.on){color:var(--tx);}
.vt.scn-tab{color:#1565C0;}
.vt.scn-tab.on{color:#1565C0;border-bottom-color:#1565C0;}
.ser-row{display:flex;gap:6px;padding:6px 14px;background:#fff;border-bottom:1px solid var(--br);flex-shrink:0;align-items:center;}
.ser-row span{font-size:10px;color:var(--mt);}
.sp{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .1s;}
.sp-r25{border-color:#7C4DFF;color:#7C4DFF;}.sp-r25.on{background:#7C4DFF;color:#fff;}
.sp-r26{border-color:#00897B;color:#00897B;}.sp-r26.on{background:#00897B;color:#fff;}
.sp-proj{border-color:#F57C00;color:#F57C00;}.sp-proj.on{background:#F57C00;color:#fff;}
.sp-scen{border-color:#1565C0;color:#1565C0;}.sp-scen.on{background:#1565C0;color:#fff;}
.vc{flex:1;overflow:auto;padding:12px 14px;}

/* KPI row */
.krow{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;}
.kpi{background:#fff;border:1px solid var(--br);border-radius:8px;padding:10px 12px;}
.kpi-l{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--mt);margin-bottom:3px;}
.kpi-v{font-size:17px;font-weight:700;}
.kpi-d{font-size:10px;color:var(--mt);margin-top:2px;}
.kpi-d .up{color:#2E7D32;font-weight:600;}.kpi-d .dn{color:#C62828;font-weight:600;}
.kpi.good{border-color:#2E7D32;background:var(--gb);}.kpi.bad{border-color:#C62828;background:var(--rb);}

/* Charts / Cards */
.crow{display:grid;grid-template-columns:3fr 2fr;gap:10px;margin-bottom:12px;}
.card{background:#fff;border:1px solid var(--br);border-radius:8px;padding:12px;}
.card-t{font-size:10px;font-weight:700;color:var(--nv);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}

/* Tables */
.tw{overflow-x:auto;}
table.t{width:100%;border-collapse:collapse;font-size:11px;}
table.t th{background:var(--bp);color:var(--nv);font-weight:700;padding:5px 7px;text-align:right;border-bottom:2px solid var(--bl);font-size:10px;white-space:nowrap;position:sticky;top:0;z-index:2;}
table.t th:first-child{text-align:left;min-width:160px;position:sticky;left:0;z-index:3;background:var(--bp);}
table.t td{padding:4px 7px;text-align:right;border-bottom:1px solid #EEF3F8;white-space:nowrap;}
table.t td:first-child{text-align:left;position:sticky;left:0;z-index:1;background:inherit;}
table.t tr.st td{background:#EBF3FA;font-weight:700;color:var(--nv);border-top:1px solid var(--bl);}
table.t tr.tot td{background:var(--nv);color:#fff;font-weight:700;}
table.t tr.ebt td{background:var(--eb);font-weight:700;color:var(--ebf);}
table.t tr.ind td{background:var(--ib);color:var(--if);font-style:italic;font-size:10px;}
table.t tr.sec td{background:var(--bl);font-weight:700;color:var(--nv);}
table.t tr.gh td{background:#F0F4F8;font-weight:700;color:var(--nv);font-size:10px;padding:3px 7px;}
table.t tr:hover:not(.st):not(.tot):not(.ebt):not(.ind):not(.sec):not(.gh) td{background:#F7FAFD;}
table.t tr.edited td:first-child::before{content:"✎ ";color:#E65100;font-size:9px;}
.pos{color:#2E7D32;}.neg{color:#C62828;}.neu{color:var(--mt);}
.c0{background:var(--r25c);}.c1{background:var(--r26c);}.c2{background:var(--prc);}.c3{background:rgba(21,101,192,.05);}

/* ── SCENARIO TAB STYLES ───────────────────────────────── */
.scn-wrap{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:14px;max-width:520px;}
.scn-card{background:#fff;border:2px solid var(--br);border-radius:10px;padding:14px;position:relative;transition:border-color .15s;}
.scn-card.active{border-color:#1565C0;box-shadow:0 2px 12px rgba(21,101,192,.12);}
.scn-card.active2{border-color:#2E7D32;box-shadow:0 2px 12px rgba(46,125,50,.12);}
.scn-card.active3{border-color:#E65100;box-shadow:0 2px 12px rgba(230,81,0,.12);}
.scn-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.scn-name{font-size:12px;font-weight:700;color:var(--nv);}
.scn-name input{border:none;border-bottom:1px dashed var(--br);background:transparent;font-size:12px;font-weight:700;color:var(--nv);width:140px;padding:0 2px;}
.scn-name input:focus{outline:none;border-bottom-color:var(--bm);}
.scn-badge{font-size:9px;padding:2px 7px;border-radius:12px;font-weight:700;}
.scn-badge.b1{background:var(--scn1);color:var(--scn1b);}
.scn-badge.b2{background:var(--scn2);color:var(--scn2b);}
.scn-badge.b3{background:var(--scn3);color:var(--scn3b);}
/* RB slider */
.scn-rb{margin-bottom:12px;}
.scn-rb-lbl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.scn-rb-lbl span:first-child{font-size:10px;color:var(--mt);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.scn-rb-lbl span:last-child{font-size:15px;font-weight:700;color:var(--nv);}
input[type=range].rb-slider{width:100%;height:5px;border-radius:3px;outline:none;cursor:pointer;-webkit-appearance:none;background:var(--bg);border:1px solid var(--br);}
input[type=range].rb-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#2E6DA4;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer;}
/* KPIs inside scenario card */
.scn-kpis{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px;}
.scn-kpi{background:var(--bg);border-radius:5px;padding:5px 7px;}
.scn-kpi-l{font-size:8px;color:var(--mt);text-transform:uppercase;letter-spacing:.04em;}
.scn-kpi-v{font-size:13px;font-weight:700;margin-top:1px;}
/* variable toggle */
.scn-toggles{border-top:1px solid var(--br);padding-top:8px;}
.scn-tgl-hdr{font-size:9px;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.tgl-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #F0F4F8;}
.tgl-row:last-child{border-bottom:none;}
.tgl-lbl{font-size:10px;color:var(--tx);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tgl-ratio{font-size:10px;color:var(--mt);width:48px;text-align:right;flex-shrink:0;}
.tgl-switch{position:relative;display:inline-block;width:28px;height:15px;flex-shrink:0;}
.tgl-switch input{opacity:0;width:0;height:0;}
.tgl-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:15px;transition:.2s;}
.tgl-slider:before{position:absolute;content:"";height:11px;width:11px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s;}
input:checked+.tgl-slider{background:#2E6DA4;}
input:checked+.tgl-slider:before{transform:translateX(13px);}
/* comparison table */
.cmp-table{width:100%;border-collapse:collapse;font-size:11px;}
.cmp-table th{background:var(--bp);color:var(--nv);font-weight:700;padding:6px 10px;text-align:right;border-bottom:2px solid var(--bl);font-size:10px;}
.cmp-table th:first-child{text-align:left;}
.cmp-table td{padding:5px 10px;text-align:right;border-bottom:1px solid #EEF3F8;}
.cmp-table td:first-child{text-align:left;font-weight:500;}
.cmp-table tr.st td{background:#EBF3FA;font-weight:700;color:var(--nv);}
.cmp-table tr.tot td{background:var(--nv);color:#fff;font-weight:700;}
.cmp-table tr.ebt td{background:var(--eb);font-weight:700;color:var(--ebf);}
.cmp-table tr.ind td{background:var(--ib);color:var(--if);font-style:italic;font-size:10px;}
.cmp-table tr.sec td{background:var(--bl);font-weight:700;color:var(--nv);}
.cmp-table tr:hover:not(.st):not(.tot):not(.ebt):not(.ind):not(.sec) td{background:#F7FAFD;}
.scn1-col{background:var(--scn1)!important;color:var(--scn1b)!important;}
.scn2-col{background:var(--scn2)!important;color:var(--scn2b)!important;}
.scn3-col{background:var(--scn3)!important;color:var(--scn3b)!important;}
.delta-pos{color:#2E7D32;font-weight:700;}
.delta-neg{color:#C62828;font-weight:700;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-row1">
    <span class="t-logo">NOVA CHAMFER</span>
    <span class="t-sep">|</span>
    <span style="font-size:11px;color:var(--mt)">Orçamento 2026</span>
    <div style="flex:1"></div>
    <label class="t-import" title="Importar realizado: Excel com colunas conta | m1..m12">
      📥 Importar
      <input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importRealizado(this)">
    </label>
    <button class="t-btn t-reset" onclick="resetAll()">↺ Reset</button>
    <button class="t-btn t-export" onclick="exportCSV()">⬇ CSV</button>
    <button class="t-btn t-excel" onclick="exportExcel()">📊 Excel</button>
  </div>
  <div class="topbar-row2" id="ccTabs"></div>
</div>

<div class="layout">
  <div class="lp">
    <div class="lp-kpis" id="lpKpis"></div>
    <div class="lp-mini">
      <div class="lp-mini-t">LAIR mensal — Proj. 2026</div>
      <div style="position:relative;height:78px"><canvas id="miniChart"></canvas></div>
    </div>
    <div class="lp-edit">
      <div class="le-hdr">Projetado — editar por conta <span>clique no valor →</span></div>
      <div id="editList"></div>
    </div>
  </div>

  <div class="rp">
    <div class="vtabs">
      <div class="vt on"  onclick="sv('r25view',this)">🟣 Ano Anterior</div>
      <div class="vt"     onclick="sv('r26view',this)">🟢 Realizado</div>
      <div class="vt"     onclick="sv('projview',this)">🟡 Projetado</div>
      <div class="vt"     onclick="sv('charts',this)">Gráficos</div>
      <div class="vt scn-tab" onclick="sv('cenarios',this)">📊 Cenários</div>
    </div>
    <!-- ser-row removed -->
    <div class="vc" id="vc"></div>
  </div>
</div>

function calcRow(rb,dev,impv,impc,cpv,pes,cus,admp,admg,vend,dep,outrD,outrR,fin){

  const ebit=ebitda+dep;
  const lair=ebit+outrD+outrR+fin;

  return{rb,dev,impv,impc,rl,cpv,pes,cus,lb,admp,admg,vend,ebitda,dep,ebit,outrD,outrR,fin,lair,
    mg_lb:s(lb),mg_eb:s(ebitda),mg_et:s(ebit),mg_lr:s(lair)};
}

  const g=grp=>grpT[grp]||Array(12).fill(0);
  const rb=g('1. RECEITA BRUTA'),dev=g('2. Devoluções'),impv=g('2. Imp. s/Vendas'),impc=g('2. Imp. s/Compras');
  const cpv=g('4. CPV Direto'),pes=g('5. Pessoal Industrial'),cus=g('5. Custos Industriais');
  const admp=g('6. Desp.Adm.Pessoal'),admg=g('6. Desp.Adm.Gerais'),vend=g('7. Desp.Vendas');
  const dep=g('8. Depreciação'),outrD=g('9. Outras Despesas'),outrR=g('9. Outras Receitas'),fin=g('10. Res.Financeiro');
  return Array(12).fill(0).map((_,i)=>calcRow(rb[i],dev[i],impv[i],impc[i],cpv[i],pes[i],cus[i],admp[i],admg[i],vend[i],dep[i],outrD[i],outrR[i],fin[i]));
}

function compute(cc,series){
  if(series==='proj') return computeFromAnal(cc);
  if(series==='scen') return computeScenario(0);
  return computeFromSint(cc,series);
}

// ── Scenario computation ──────────────────────────────────────────────────────
// Base proj (edited or not) for CONSOLIDADO
function computeScenario(scenIdx){
  const scn=scenarios[scenIdx];
  const toggles=scenVarToggles[scenIdx];
  const baseProj=computeFromAnal('CONSOLIDADO'); // base proj with any edits
  const baseAnal=DATA['CONSOLIDADO']?.anal||[];

  // For each month, scale variable accounts proportionally to new RB
  // Fixed accounts stay the same
  const newRB = scn.rb; // monthly flat

  return Array(12).fill(0).map((_,mi)=>{
    const baseRBm = baseProj[mi].rb || BASE_RB;
    const ratio = baseRBm !== 0 ? newRB / baseRBm : 1;

    // Start from base proj group totals
    const grpT={};
    Object.keys(GRPKEYS).forEach(g=>{ grpT[g]=baseProj[mi][
      {  '1. RECEITA BRUTA':'rb','2. Devoluções':'dev','2. Imp. s/Vendas':'impv',
         '2. Imp. s/Compras':'impc','4. CPV Direto':'cpv','5. Pessoal Industrial':'pes',
         '5. Custos Industriais':'cus','6. Desp.Adm.Pessoal':'admp','6. Desp.Adm.Gerais':'admg',
         '7. Desp.Vendas':'vend','8. Depreciação':'dep','9. Outras Despesas':'outrD',
         '9. Outras Receitas':'outrR','10. Res.Financeiro':'fin'}[g]
    ]||0; });

    // Override RB to scenario value
    grpT['1. RECEITA BRUTA'] = newRB;

    // Apply proportional adjustments for variable accounts
    Object.entries(VAR_RATIOS).forEach(([conta,info])=>{
      if(!toggles[conta]) return; // skip if toggled off (keep base value)
      const avgRatio = info.avg;
      // Find which group this account belongs to
      const acct=baseAnal.find(a=>a.conta===conta);
      if(!acct) return;
      const grp=acct.grupo;
      if(!grpT.hasOwnProperty(grp)) return;
      // Replace this account's contribution: remove base, add proportional
      const baseVal = isEdited('CONSOLIDADO',conta) ? (edits['CONSOLIDADO'][conta][mi]||0) : (acct.proj[mi]||0);
      const newVal = newRB * avgRatio;
      grpT[grp] = (grpT[grp] - baseVal) + newVal;
    });

    return calcRow(
      grpT['1. RECEITA BRUTA'],grpT['2. Devoluções'],grpT['2. Imp. s/Vendas'],grpT['2. Imp. s/Compras'],
      grpT['4. CPV Direto'],grpT['5. Pessoal Industrial'],grpT['5. Custos Industriais'],
      grpT['6. Desp.Adm.Pessoal'],grpT['6. Desp.Adm.Gerais'],grpT['7. Desp.Vendas'],
      grpT['8. Depreciação'],grpT['9. Outras Despesas'],grpT['9. Outras Receitas'],grpT['10. Res.Financeiro']
    );
  });
}

function annual(rows,key,r26=false){ const r=r26?rows.slice(0,2):rows; return r.reduce((a,x)=>a+(x?x[key]||0:0),0); }

// ── Formats ───────────────────────────────────────────────────────────────────
function fmtM(v){
  const a=Math.abs(v||0);
  const s=a>=1e6?(a/1e6).toFixed(1)+'M':a>=1e3?Math.round(a/1e3)+'k':Math.round(a).toString();
  return(v<0?'−':'')+s;
}
function fmtFull(v){ return(v<0?'−':'')+Math.abs(Math.round(v||0)).toLocaleString('pt-BR'); }
function cls(v){ return v>0?'pos':v<0?'neg':'neu'; }

function toggleEdit(conta){
  const aid=conta.replace(/\./g,'_');
  const el=document.getElementById('ied_'+aid);
  if(!el) return;
  const wasOpen=el.classList.contains('open');
  document.querySelectorAll('.ied.open').forEach(e=>e.classList.remove('open'));
  if(wasOpen) return;
  const k=ek(activeCC);
  const a=(DATA[k]?.anal||[]).find(x=>x.conta===conta);
  if(!a) return;
  const vals=isEdited(activeCC,conta)?(edits[k][conta]||a.proj):a.proj;
  document.getElementById('iedg_'+aid).innerHTML=MONTHS.map((m,i)=>
    `<div class="ied-m"><label>${m}</label><input type="number" id="ief_${aid}_${i}" value="${Math.round(vals[i]||0)}" step="100"></div>`
  ).join('');
  el.classList.add('open');
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function applyEdit(conta){
  const aid=conta.replace(/\./g,'_');
  const vals=MONTHS.map((_,i)=>{ const el=document.getElementById(`ief_${aid}_${i}`); return el?parseFloat(el.value)||0:0; });
  setEdit(activeCC,conta,vals);
  renderEditList(); renderCCTabs(); update();
  setTimeout(()=>toggleEdit(conta),60);
}

  MONTHS.forEach(()=>active.forEach(s=>{ h+=`<th class="c${s.ci}" style="font-size:9px">${s.label.split('.')[0]}</th>`; }));
  active.forEach(s=>{ h+=`<th class="c${s.ci}" style="font-size:9px;background:rgba(13,33,55,.8);color:rgba(255,255,255,.7)">${s.label.split('.')[0]}</th>`; });
  h+='</tr></thead><tbody>';
  SINT_LINES.forEach(([lbl,key,style])=>{
    const isPct=key.startsWith('mg_');
    const trCls=style==='subtotal'?'st':style==='total'?'tot':style==='ebit'?'ebt':style==='indicator'?'ind':style==='section'?'sec':'';
    let tr=`<tr class="${trCls}"><td>${lbl}</td>`;
    MONTHS.forEach((_,i)=>{
      active.forEach(s=>{
        const row=rows[s.key]?.[i]; let v=row?row[key]:null;
        if(s.key==='r26'&&i>1) v=null;
        if(v===null){ tr+=`<td class="c${s.ci} neu" style="color:#ccc">—</td>`; }
        else if(isPct){ tr+=`<td class="c${s.ci}" style="font-style:italic;font-size:10px;color:var(--if)">${(v*100).toFixed(1)}%</td>`; }
        else{ tr+=`<td class="c${s.ci} ${cls(v)}">${fmtM(v)}</td>`; }
      });
    });
    active.forEach(s=>{
      const r=rows[s.key]||[]; const fil=s.key==='r26'?r.slice(0,2):r;
      if(isPct){
        const nk={mg_lb:'lb',mg_eb:'ebitda',mg_et:'ebit',mg_lr:'lair'}[key];
        const rlt=fil.reduce((a,x)=>a+(x.rl||0),0); const nt=fil.reduce((a,x)=>a+(x[nk]||0),0);
        tr+=`<td class="c${s.ci}" style="font-style:italic;font-size:10px;color:var(--if);font-weight:700">${(rlt?nt/rlt:0)*100..toFixed(1)}%</td>`;
      } else {
        const tot=fil.reduce((a,x)=>a+(x[key]||0),0);
        tr+=`<td class="c${s.ci} ${cls(tot)}" style="font-weight:700">${fmtM(tot)}</td>`;
      }
    });
    h+=tr+'</tr>';
  });
  return h+'</tbody></table>';
}

    });
    h+=tr+'</tr>';

}

function exportExcel(){
  if(typeof XLSX==='undefined'){ alert('Aguarde o carregamento da biblioteca Excel.'); return; }
  const ccName=(DATA[activeCC]?.name||activeCC).replace(/[^a-zA-Z0-9]/g,'_');
  const wb=XLSX.utils.book_new();

  function makeCell(v,isPct){
    if(v===null||v===undefined) return {t:'z'};
    if(isPct) return {t:'n',v:parseFloat((v*100).toFixed(2)),z:'0.0%'};
    return {t:'n',v:Math.round(v),z:'#,##0;(#,##0);"-"'};
  }

  function buildSheet(seriesList, sheetTitle){
    const aoa=[];
    // Pre-compute
    const crows={};
    seriesList.forEach(s=>{ crows[s.key]=compute(activeCC,s.key); });
    const ns=seriesList.length;

    // Header 1: months merged (write month repeated ns times)
    const h1=['Linha DRE'];
    MONTHS.forEach(m=>seriesList.forEach(s=>h1.push(m)));
    seriesList.forEach(s=>h1.push('Total'));
    aoa.push(h1);

    // Header 2: series labels
    const h2=[''];
    MONTHS.forEach(()=>seriesList.forEach(s=>h2.push(s.label)));
    seriesList.forEach(s=>h2.push(s.label));
    aoa.push(h2);

    // Data rows
    SINT_LINES.forEach(([lbl,key])=>{
      const isPct=key.startsWith('mg_');
      const row=[lbl];
      MONTHS.forEach((_,mi)=>{
        seriesList.forEach(s=>{
          const r=crows[s.key]?.[mi];
          let v=r?r[key]:null;
          if(s.key==='r26'&&mi>1) v=null;
          row.push(isPct?(v!=null?(v*100).toFixed(2):null):(v!=null?Math.round(v):null));
        });
      });
      // Totals
      seriesList.forEach(s=>{
        const fil=s.key==='r26'?crows[s.key].slice(0,2):crows[s.key];
        if(isPct){
          const nk={mg_lb:'lb',mg_eb:'ebitda',mg_et:'ebit',mg_lr:'lair'}[key];
          const rlt=fil.reduce((a,r)=>a+(r.rl||0),0);
          const nt=fil.reduce((a,r)=>a+(r[nk]||0),0);
          row.push(rlt?parseFloat((nt/rlt*100).toFixed(2)):null);
        } else {
          row.push(Math.round(fil.reduce((a,r)=>a+(r[key]||0),0)));
        }
      });
      aoa.push(row);
    });

    const ws=XLSX.utils.aoa_to_sheet(aoa);
    // Column widths
    ws['!cols']=[{wch:34},...Array(ns*12+ns).fill({wch:10})];
    XLSX.utils.book_append_sheet(wb,ws,sheetTitle);
  }

  // Analítico sheet
  function buildAnalSheet(){
    const k=ek(activeCC);
    const anal=DATA[k]?.anal||[];
    const serList=[{key:'r25',label:'Ant.2025'},{key:'r26',label:'Real.2026'},{key:'proj',label:'Proj.2026'},{key:'scen',label:'Cenário'}];
    const crows={};
    serList.forEach(s=>{ crows[s.key]=compute(activeCC,s.key); });
    const h1=['Grupo','Conta','Nome'];
    MONTHS.forEach(m=>serList.forEach(s=>h1.push(m+' '+s.label)));
    serList.forEach(s=>h1.push('Total '+s.label));
    const aoa=[h1];
    anal.forEach(a=>{
      const row=[a.grupo,a.conta,a.nome];
      MONTHS.forEach((_,mi)=>{
        serList.forEach(s=>{
          let v=0;
          if(s.key==='r25') v=parseFloat(a.r25[mi])||0;
          else if(s.key==='r26') v=mi<=1?(parseFloat(a.r26[mi])||0):0;
          else if(s.key==='proj') v=isEdited(activeCC,a.conta)?(edits[k][a.conta][mi]||0):(parseFloat(a.proj[mi])||0);
          else if(s.key==='scen'){
            const scnR=computeScenario(0);
            // approximate: use proj scaled by scenario ratio
            const projTot=crows['proj'].reduce((a,r)=>a+(r.rb||0),0)/12;
            const scnRb=scenarios[0].rb;
            const ratio=projTot?scnRb/projTot:1;
            v=parseFloat(a.proj[mi])*ratio||0;
          }
          row.push(Math.round(v));
        });
      });
      serList.forEach(s=>{
        let src;
        if(s.key==='r25') src=a.r25;
        else if(s.key==='r26') src=a.r26.slice(0,2);
        else if(s.key==='proj') src=isEdited(activeCC,a.conta)?(edits[k][a.conta]||a.proj):a.proj;
        else src=a.proj; // scen approx
        row.push(Math.round((src||[]).reduce((t,v)=>t+(parseFloat(v)||0),0)));
      });
      aoa.push(row);
    });
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[{wch:22},{wch:18},{wch:36},...Array(h1.length-3).fill({wch:10})];
    XLSX.utils.book_append_sheet(wb,ws,'Analítico');
  }

  buildSheet([{key:'r25',label:'Ant.2025',ci:0}],'Ano Anterior 2025');
  buildSheet([{key:'r25',label:'Ant.2025',ci:0},{key:'r26',label:'Real.2026',ci:1},{key:'proj',label:'Proj.2026',ci:2}],'Realizado');
  buildSheet([{key:'proj',label:'Proj.2026',ci:2},{key:'scen',label:'Cenário',ci:3}],'Projetado');
  buildAnalSheet();

  const fname=`NovaChamfer_${ccName}_2026.xlsx`;
  XLSX.writeFile(wb,fname);
  console.log('Excel exported:',fname);
}

// ── IMPORT REALIZADO ──────────────────────────────────────────────────────────
function importRealizado(input){
  const file=input.files[0];
  if(!file){ return; }
  input.value=''; // reset so same file can be re-imported

  const reader=new FileReader();
  reader.onload=function(e){
    try{
      let rows=[];
      const name=file.name.toLowerCase();

      if(name.endsWith('.csv')){
        // Parse CSV (semicolon or comma)
        const text=new TextDecoder('utf-8').decode(new Uint8Array(e.target.result));
        const sep=text.indexOf(';')>-1?';':',';
        rows=text.trim().split('\n').map(r=>r.split(sep).map(c=>c.trim().replace(/^"|"$/g,'')));
      } else {
        // Parse Excel with SheetJS
        if(typeof XLSX==='undefined'){ alert('Biblioteca Excel não carregada. Tente novamente em instantes.'); return; }
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        // Try "Analítico" sheet first, then first sheet
        const shName=wb.SheetNames.find(s=>s.toLowerCase().includes('analítico')||s.toLowerCase().includes('analitico'))||wb.SheetNames[0];
        const ws=wb.Sheets[shName];
        rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
      }

      if(!rows||rows.length<2){ alert('Arquivo vazio ou sem dados.'); return; }

      // ── Detect header row and column positions ──────────────────────────
      const hdrIdx=rows.findIndex(r=>r&&r.some(c=>String(c||'').toLowerCase().includes('conta')));
      if(hdrIdx<0){ alert('Coluna "conta" não encontrada no arquivo.\nFormato esperado: conta | m1 | m2 | ... | m12'); return; }
      const hdr=rows[hdrIdx].map(c=>String(c||'').toLowerCase().trim());

      const col=name=>hdr.indexOf(name);
      const colIncludes=(part)=>hdr.findIndex(h=>h.includes(part));

      // Detect conta column
      const contaCol=colIncludes('conta');
      if(contaCol<0){ alert('Coluna "conta" não encontrada.'); return; }

      // Detect cc column (optional)
      const ccCol=colIncludes('cc')>-1?colIncludes('cc'):-1;

      // Detect year — look for 'ano' column or infer from header text
      // "2025", "2026", or month column names
      let year=2026; // default to current year
      const anoCol=colIncludes('ano');
      if(anoCol>-1){
        const sampleYr=rows[hdrIdx+1]?.[anoCol];
        if(sampleYr&&!isNaN(Number(sampleYr))) year=Number(sampleYr);
      } else {
        // Try to detect year from header (e.g. "Jan Ant.2025" or "2025-01")
        const hdrStr=hdr.join(' ');
        if(hdrStr.includes('2025')) year=2025;
        else if(hdrStr.includes('2026')) year=2026;
      }

      // Detect month columns
      // Strategy 1: look for m1..m12 or jan..dez
      const MNAMES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
      let mCols=[];

      // Try "m1".."m12"
      const m1=colIncludes('m1'); if(m1>-1&&hdr[m1]==='m1'){
        mCols=Array.from({length:12},(_,i)=>colIncludes(`m${i+1}`));
      }
      // Try month names (jan, fev...)
      if(mCols.length<12||mCols.some(c=>c<0)){
        mCols=MNAMES.map(mn=>hdr.findIndex(h=>h.startsWith(mn)||h===mn));
      }
      // Try date-style headers (2026-01, 2026-02...) or numbered columns after conta
      if(mCols.length<12||mCols.some(c=>c<0)){
        // Just take 12 consecutive numeric-ish columns after conta
        const numericCols=[];
        for(let c=0;c<hdr.length;c++){
          if(c===contaCol||c===ccCol) continue;
          const sample=rows.slice(hdrIdx+1,hdrIdx+4).map(r=>r[c]).filter(v=>v!=null);
          if(sample.some(v=>!isNaN(parseFloat(v)))) numericCols.push(c);
        }
        mCols=numericCols.slice(0,12);
      }

      // Find "Real.2026" columns in our own export format
      // Header like "Jan Real.2026", "Fev Real.2026" etc
      const r26Cols=[];
      hdr.forEach((h,i)=>{ if(h.includes('real') && (h.includes('2026')||year===2026)) r26Cols.push(i); });
      const r25Cols=[];
      hdr.forEach((h,i)=>{ if(h.includes('ant') || (h.includes('2025'))) r25Cols.push(i); });

      // Determine which columns hold the data for each month
      // Prefer r26Cols if found (our exported format), else use mCols
      const useR26=r26Cols.length>=2;
      const useR25=r25Cols.length>=12;
      const finalCols=useR26?r26Cols:(useR25&&year===2025?r25Cols:mCols);

      const nMonths=finalCols.length;
      if(nMonths<1){ alert(`Não foi possível detectar colunas de meses.\nCertifique-se que o arquivo tem colunas: conta | m1 | m2 | ... | m12\nou use o arquivo exportado pelo app.`); return; }

      // ── Parse data rows ─────────────────────────────────────────────────
      const imported={}; // {conta: {cc:x, values:[12 floats]}}
      let countOk=0, countMiss=0;

      for(let ri=hdrIdx+1;ri<rows.length;ri++){
        const row=rows[ri];
        if(!row||!row[contaCol]) continue;
        const conta=String(row[contaCol]).trim();
        if(!conta||conta===''||conta.toLowerCase()==='conta') continue;
        const cc=ccCol>-1?parseInt(row[ccCol])||null:null;
        const vals=finalCols.map(c=>{ const v=parseFloat(row[c]); return isNaN(v)?0:v; });
        // Pad to 12
        while(vals.length<12) vals.push(0);
        if(!imported[conta]) imported[conta]={cc,values:Array(12).fill(0)};
        // Sum if multiple CC rows
        vals.forEach((v,i)=>{ imported[conta].values[i]+=v; });
        countOk++;
      }

      if(countOk===0){ alert('Nenhuma linha de dado encontrada no arquivo.'); return; }

      // ── Apply to DATA for all CCs (or specific CC) ──────────────────────
      const targetSeries=year===2025?'r25':'r26';
      let applied=0, notFound=0;

      // Update per CC or consolidated
      Object.entries(DATA).forEach(([ccKey,tab])=>{
        const ccNum=ccKey==='CONSOLIDADO'?null:parseInt(ccKey);
        const anal=tab.anal||[];
        anal.forEach(a=>{
          const imp=imported[a.conta];
          if(!imp) return;
          // If CC filter: match cc, or skip if doesn't match
          if(imp.cc!==null && ccNum!==null && imp.cc!==ccNum) return;
          a[targetSeries]=imp.values.slice(0,12).map((v,i)=>{
            // r26 only has Jan/Feb natively; allow all months for import
            return v;
          });
          applied++;
        });
        // Also update sint (group-level) by re-aggregating from anal
        const grpT={};
        anal.forEach(a=>{
          const grp=a.grupo;
          if(!grpT[grp]) grpT[grp]=Array(12).fill(0);
          (a[targetSeries]||[]).forEach((v,i)=>{ grpT[grp][i]+=(parseFloat(v)||0); });
        });
        if(!tab.sint) tab.sint={};
        Object.entries(grpT).forEach(([grp,vals])=>{
          if(!tab.sint[grp]) tab.sint[grp]={};
          tab.sint[grp][targetSeries]=vals;
        });
      });

      Object.keys(imported).forEach(c=>{ if(!(DATA['CONSOLIDADO']?.anal||[]).find(a=>a.conta===c)) notFound++; });

      // ── Done ─────────────────────────────────────────────────────────────
      update();
      renderLpKpis();
      renderMini();

      const serLabel=targetSeries==='r25'?'Ano Anterior 2025':'Realizado 2026';
      const msg=`✅ Importação concluída!\n\n• Série: ${serLabel}\n• Contas atualizadas: ${applied}\n• Contas não encontradas: ${notFound}\n• Meses importados: ${nMonths}\n\nOs valores foram aplicados em todos os CCs.`;
      alert(msg);

    } catch(err){
      console.error('Import error:',err);
      alert('Erro ao importar: '+err.message+'\n\nVerifique o formato do arquivo.');
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── Main update ───────────────────────────────────────────────────────────────
function update(){
  renderLpKpis(); renderMini();
  const vc=document.getElementById('vc');
  if(['r25view','r26view','projview'].includes(activeView)){
    const title = activeView==='r25view'?'Ano Anterior 2025': activeView==='r26view'?'Realizado 2026 (Ant. · Real. · Proj.)':'Projetado 2026 (Base · Cenário)';
    vc.innerHTML=`<div class="card" style="margin-bottom:10px"><div class="card-t">${title} — ${DATA[activeCC]?.name||activeCC}</div><div class="tw">${buildSint()}</div></div>`
      +`<div class="card"><div class="card-t">Detalhamento por Conta — ${title}</div><div class="tw">${buildAnal()}</div></div>`;
  }
  else if(activeView==='charts') renderCharts(vc);
  else if(activeView==='cenarios') renderScenarios(vc);
  else { vc.innerHTML=`<div class="card"><div class="card-t">DRE — ${DATA[activeCC]?.name||activeCC}</div><div class="tw">${buildSint()}</div></div>`; }
}

// Init
renderCCTabs(); renderEditList(); update();
</script>
